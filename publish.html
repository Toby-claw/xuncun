<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发布 - 寻村</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .publish-page { background: #f5f5f5; min-height: 100vh; }
        .pub-header {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .pub-header h2 { font-size: 17px; font-weight: 600; }
        .pub-header .cancel { color: #666; font-size: 15px; }
        .pub-header .submit {
            background: #10b981;
            color: #fff;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 14px;
            border: none;
        }
        .pub-header .submit:disabled { background: #ccc; }

        /* 角色切换条 */
        .role-bar {
            background: #fff;
            padding: 8px 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .role-bar span { color: #666; }
        .role-btn {
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        .role-btn.active {
            background: #10b981;
            color: #fff;
            border-color: #10b981;
        }

        .pub-type {
            background: #fff;
            padding: 16px;
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }
        .type-item {
            flex: 1;
            text-align: center;
            padding: 16px 12px;
            border-radius: 12px;
            border: 2px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .type-item.hidden { display: none; }
        .type-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .type-item.active {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .type-item .icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .type-travel .icon { background: #fef3c7; }
        .type-product .icon { background: #fce7f3; }
        .type-notice .icon { background: #dbeafe; }
        .type-item .lock {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .pub-content {
            background: #fff;
            padding: 16px;
        }
        .pub-textarea {
            width: 100%;
            min-height: 120px;
            border: none;
            resize: none;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }
        .pub-textarea::placeholder { color: #999; }

        .pub-media {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .media-add {
            width: 80px;
            height: 80px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            cursor: pointer;
        }
        .media-add svg { margin-bottom: 4px; }

        .pub-options {
            background: #fff;
            margin-top: 12px;
            padding: 0 16px;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .option-item:last-child { border-bottom: none; }
        .option-item svg { margin-right: 12px; color: #666; }
        .option-item span { flex: 1; font-size: 15px; }
        .option-item .arrow { color: #999; }
        .option-item .value { color: #999; font-size: 14px; margin-right: 8px; }

        /* 权限提示 */
        .perm-tip {
            background: #fffbeb;
            border: 1px solid #fcd34d;
            color: #92400e;
            padding: 12px 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="publish-page">
        <div class="pub-header">
            <span class="cancel" onclick="goBack()">取消</span>
            <h2>发布内容</h2>
            <button class="submit" onclick="publish()">发布</button>
        </div>

        <!-- 角色切换（演示用） -->
        <div class="role-bar">
            <span>当前身份：</span>
            <button class="role-btn active" onclick="switchRole('tourist')" id="btn-tourist">游客</button>
            <button class="role-btn" onclick="switchRole('villager')" id="btn-villager">村民</button>
            <button class="role-btn" onclick="switchRole('admin')" id="btn-admin">管理员</button>
        </div>

        <!-- 权限提示 -->
        <div class="perm-tip" id="permTip">
            <span>ℹ️</span>
            <span id="permText">游客只能浏览，请登录后发布游记</span>
        </div>

        <div class="pub-type" id="pubType">
            <div class="type-item type-travel active" id="type-travel" onclick="selectType('travel')">
                <div class="icon">📸</div>
                <div>发游记</div>
            </div>
            <div class="type-item type-product disabled" id="type-product" onclick="selectType('product')">
                <div class="icon">🍊</div>
                <div>卖好物</div>
                <div class="lock">村民专属</div>
            </div>
            <div class="type-item type-notice disabled" id="type-notice" onclick="selectType('notice')">
                <div class="icon">📢</div>
                <div>发公告</div>
                <div class="lock">管理员专属</div>
            </div>
        </div>

        <div class="pub-content">
            <textarea class="pub-textarea" placeholder="分享你在村庄的见闻、美食、风景..." id="content"></textarea>
            <div class="pub-media">
                <div class="media-add" onclick="addMedia()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>添加图片</span>
                </div>
            </div>
        </div>

        <div class="pub-options">
            <div class="option-item" onclick="selectLocation()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>所在位置</span>
                <span class="value" id="location">牛路村</span>
                <span class="arrow">›</span>
            </div>
            <div class="option-item" onclick="selectVillage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>所属村庄</span>
                <span class="value" id="village">牛路村</span>
                <span class="arrow">›</span>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let selectedType = 'travel';
        let currentRole = 'tourist';

        // 权限配置
        const ROLE_PERMS = {
            tourist: {
                canTravel: false,
                canProduct: false,
                canNotice: false,
                tip: '游客只能浏览，请登录后发布游记'
            },
            user: {
                canTravel: true,
                canProduct: false,
                canNotice: false,
                tip: '您可以发布游记分享见闻'
            },
            villager: {
                canTravel: true,
                canProduct: true,
                canNotice: false,
                tip: '村民可以发布游记和售卖农产品'
            },
            admin: {
                canTravel: true,
                canProduct: true,
                canNotice: true,
                tip: '管理员可以发布所有类型内容'
            }
        };

        function goBack() {
            window.location.href = 'index.html';
        }

        function switchRole(role) {
            currentRole = role;
            
            // 更新按钮状态
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + role).classList.add('active');
            
            // 更新权限提示
            const perms = ROLE_PERMS[role];
            document.getElementById('permText').textContent = perms.tip;
            
            // 更新发布类型可用状态
            updateTypeVisibility(perms);
            
            // 如果当前选中的类型不可用，切换到游记
            if (!isTypeAllowed(selectedType, perms)) {
                selectType('travel');
            }
        }

        function updateTypeVisibility(perms) {
            const travelEl = document.getElementById('type-travel');
            const productEl = document.getElementById('type-product');
            const noticeEl = document.getElementById('type-notice');
            
            // 游记 - 注册用户可用
            if (perms.canTravel) {
                travelEl.classList.remove('disabled');
                travelEl.querySelector('.lock')?.remove();
            } else {
                travelEl.classList.add('disabled');
                if (!travelEl.querySelector('.lock')) {
                    travelEl.insertAdjacentHTML('beforeend', '<div class="lock">登录后可用</div>');
                }
            }
            
            // 好物 - 村民可用
            if (perms.canProduct) {
                productEl.classList.remove('disabled');
                productEl.querySelector('.lock')?.remove();
            } else {
                productEl.classList.add('disabled');
            }
            
            // 公告 - 管理员可用
            if (perms.canNotice) {
                noticeEl.classList.remove('disabled');
                noticeEl.querySelector('.lock')?.remove();
            } else {
                noticeEl.classList.add('disabled');
            }
        }

        function isTypeAllowed(type, perms) {
            if (type === 'travel') return perms.canTravel;
            if (type === 'product') return perms.canProduct;
            if (type === 'notice') return perms.canNotice;
            return false;
        }

        function selectType(type) {
            const perms = ROLE_PERMS[currentRole];
            
            if (!isTypeAllowed(type, perms)) {
                if (type === 'product') toast('只有村民可以售卖农产品');
                if (type === 'notice') toast('只有管理员可以发布公告');
                if (type === 'travel' && currentRole === 'tourist') toast('请登录后发布游记');
                return;
            }
            
            document.querySelectorAll('.type-item').forEach(item => item.classList.remove('active'));
            document.getElementById('type-' + type).classList.add('active');
            selectedType = type;

            const textarea = document.getElementById('content');
            if (type === 'travel') {
                textarea.placeholder = '分享你在村庄的见闻、美食、风景...';
            } else if (type === 'product') {
                textarea.placeholder = '介绍你的产品，包括品种、价格、联系方式...';
            } else if (type === 'notice') {
                textarea.placeholder = '发布村务通知、活动公告...';
            }
        }

        function addMedia() {
            toast('选择图片功能（演示版）');
        }

        function selectLocation() {
            toast('定位功能（演示版）');
        }

        function selectVillage() {
            toast('选择村庄功能（演示版）');
        }

        function publish() {
            const perms = ROLE_PERMS[currentRole];
            
            if (!isTypeAllowed(selectedType, perms)) {
                toast('当前身份无权限发布此类型内容');
                return;
            }
            
            const content = document.getElementById('content').value.trim();
            if (!content) {
                toast('请输入内容');
                return;
            }

            toast('发布成功！');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // 初始化
        switchRole('tourist');
    </script>
</body>
</html>
