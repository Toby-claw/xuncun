<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发布 - 寻村</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .publish-page { background: #f5f5f5; min-height: 100vh; }
        .pub-header {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .pub-header h2 { font-size: 17px; font-weight: 600; }
        .pub-header .cancel { color: #666; font-size: 15px; }
        .pub-header .submit {
            background: #10b981;
            color: #fff;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 14px;
            border: none;
        }
        .pub-header .submit:disabled { background: #ccc; }

        /* 角色切换条 */
        .role-bar {
            background: #fff;
            padding: 8px 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .role-bar span { color: #666; }
        .role-btn {
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        .role-btn.active {
            background: #10b981;
            color: #fff;
            border-color: #10b981;
        }

        .pub-type {
            background: #fff;
            padding: 16px;
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }
        .type-item {
            flex: 1;
            text-align: center;
            padding: 16px 12px;
            border-radius: 12px;
            border: 2px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .type-item.hidden { display: none; }
        .type-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .type-item.active {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .type-item .icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .type-travel .icon { background: #fef3c7; }
        .type-product .icon { background: #fce7f3; }
        .type-notice .icon { background: #dbeafe; }
        .type-item .lock {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .pub-content {
            background: #fff;
            padding: 16px;
        }
        .pub-textarea {
            width: 100%;
            min-height: 120px;
            border: none;
            resize: none;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }
        .pub-textarea::placeholder { color: #999; }

        /* 图片上传区域 */
        .pub-media {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .media-item {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            background: #f5f5f5;
        }
        .media-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .media-delete {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .media-add {
            width: 80px;
            height: 80px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            cursor: pointer;
            position: relative;
        }
        .media-add svg { margin-bottom: 4px; }
        .media-add input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .media-count {
            width: 100%;
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .pub-options {
            background: #fff;
            margin-top: 12px;
            padding: 0 16px;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .option-item:last-child { border-bottom: none; }
        .option-item svg { margin-right: 12px; color: #666; }
        .option-item span { flex: 1; font-size: 15px; }
        .option-item .arrow { color: #999; }
        .option-item .value { color: #999; font-size: 14px; margin-right: 8px; }

        /* 无权限提示 */
        .no-perm-box {
            display: none;
            background: #fff;
            padding: 40px;
            text-align: center;
        }
        .no-perm-box .icon { font-size: 48px; margin-bottom: 16px; }
        .no-perm-box h3 { margin-bottom: 8px; }
        .no-perm-box p { color: #666; margin-bottom: 24px; }
        .no-perm-box button {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="publish-page">
        <div class="pub-header">
            <span class="cancel" onclick="goBack()">取消</span>
            <h2>发布内容</h2>
            <button class="submit" onclick="publish()">发布</button>
        </div>

        <!-- 角色切换（演示用） -->
        <div class="role-bar">
            <span>切换身份（演示）：</span>
            <button class="role-btn active" onclick="switchRole('user')" id="btn-user">注册用户</button>
            <button class="role-btn" onclick="switchRole('villager')" id="btn-villager">村民</button>
            <button class="role-btn" onclick="switchRole('admin')" id="btn-admin">管理员</button>
        </div>

        <!-- 无权限提示 -->
        <div class="no-perm-box" id="noPermBox">
            <div class="icon">🔒</div>
            <h3>请先登录</h3>
            <p>登录后即可发布内容</p>
            <button onclick="goToLogin()">去登录</button>
        </div>

        <div class="pub-type" id="pubType">
            <div class="type-item type-travel active" id="type-travel" onclick="selectType('travel')">
                <div class="icon">📸</div>
                <div>发游记</div>
            </div>
            <div class="type-item type-product hidden" id="type-product" onclick="selectType('product')">
                <div class="icon">🍊</div>
                <div>卖好物</div>
            </div>
            <div class="type-item type-notice hidden" id="type-notice" onclick="selectType('notice')">
                <div class="icon">📢</div>
                <div>发公告</div>
            </div>
        </div>

        <div class="pub-content">
            <textarea class="pub-textarea" placeholder="分享你在村庄的见闻、美食、风景..." id="content"></textarea>
            
            <!-- 图片上传区域 -->
            <div class="pub-media" id="mediaContainer">
                <!-- 图片预览会插入这里 -->
                <div class="media-add" id="addBtn" onclick="selectImage()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>添加图片</span>
                    <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImages(this)">
                </div>
            </div>
            <div class="media-count" id="mediaCount">0/9</div>
        </div>

        <div class="pub-options">
            <div class="option-item" onclick="selectLocation()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>所在位置</span>
                <span class="value" id="location">牛路村</span>
                <span class="arrow">›</span>
            </div>
            <div class="option-item" onclick="selectVillage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>所属村庄</span>
                <span class="value" id="village">牛路村</span>
                <span class="arrow">›</span>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let selectedType = 'travel';
        let currentRole = 'user';
        let selectedImages = []; // 存储选择的图片
        const MAX_IMAGES = 9;

        // 页面加载时检查登录状态
        function checkLogin() {
            const user = localStorage.getItem('xuncun_user');
            if (user) {
                const userInfo = JSON.parse(user);
                if (userInfo.role === 'admin') {
                    switchRole('admin');
                } else if (userInfo.role === 'villager') {
                    switchRole('villager');
                } else {
                    switchRole('user');
                }
                document.querySelector('.role-bar').style.display = 'none';
            } else {
                showNoPerm();
            }
        }

        function showNoPerm() {
            document.getElementById('pubType').style.display = 'none';
            document.getElementById('noPermBox').style.display = 'block';
            document.querySelector('.pub-content').style.display = 'none';
            document.querySelector('.pub-options').style.display = 'none';
            document.querySelector('.submit').style.display = 'none';
        }

        function goToLogin() {
            sessionStorage.setItem('returnUrl', 'publish.html');
            window.location.href = 'login.html';
        }

        // 权限配置
        const ROLE_PERMS = {
            user: {
                canTravel: true,
                canProduct: false,
                canNotice: false
            },
            villager: {
                canTravel: true,
                canProduct: true,
                canNotice: false
            },
            admin: {
                canTravel: true,
                canProduct: true,
                canNotice: true
            }
        };

        function goBack() {
            window.location.href = 'index.html';
        }

        function switchRole(role) {
            currentRole = role;
            
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.getElementById('btn-' + role);
            if (btn) btn.classList.add('active');
            
            const perms = ROLE_PERMS[role];
            updateTypeVisibility(perms);
            
            const visibleTypes = document.querySelectorAll('.type-item:not(.hidden)');
            if (visibleTypes.length > 0) {
                const firstType = visibleTypes[0].id.replace('type-', '');
                selectType(firstType);
            }
        }

        function updateTypeVisibility(perms) {
            const travelEl = document.getElementById('type-travel');
            const productEl = document.getElementById('type-product');
            const noticeEl = document.getElementById('type-notice');
            
            if (perms.canTravel) {
                travelEl.classList.remove('hidden');
            } else {
                travelEl.classList.add('hidden');
            }
            
            if (perms.canProduct) {
                productEl.classList.remove('hidden');
            } else {
                productEl.classList.add('hidden');
            }
            
            if (perms.canNotice) {
                noticeEl.classList.remove('hidden');
            } else {
                noticeEl.classList.add('hidden');
            }
            
            const visibleTypes = document.querySelectorAll('.type-item:not(.hidden)');
            if (visibleTypes.length === 1) {
                visibleTypes[0].style.flex = '0 0 120px';
            } else {
                visibleTypes.forEach(el => el.style.flex = '1');
            }
        }

        function isTypeAllowed(type, perms) {
            if (type === 'travel') return perms.canTravel;
            if (type === 'product') return perms.canProduct;
            if (type === 'notice') return perms.canNotice;
            return false;
        }

        function selectType(type) {
            const perms = ROLE_PERMS[currentRole];
            
            if (!isTypeAllowed(type, perms)) {
                if (type === 'product') toast('只有村民可以售卖农产品');
                if (type === 'notice') toast('只有管理员可以发布公告');
                if (type === 'travel') toast('请登录后发布游记');
                return;
            }
            
            document.querySelectorAll('.type-item').forEach(item => item.classList.remove('active'));
            document.getElementById('type-' + type).classList.add('active');
            selectedType = type;

            const textarea = document.getElementById('content');
            if (type === 'travel') {
                textarea.placeholder = '分享你在村庄的见闻、美食、风景...';
            } else if (type === 'product') {
                textarea.placeholder = '介绍你的产品，包括品种、价格、联系方式...';
            } else if (type === 'notice') {
                textarea.placeholder = '发布村务通知、活动公告...';
            }
        }

        // ========== 图片上传功能 ==========
        
        function selectImage() {
            if (selectedImages.length >= MAX_IMAGES) {
                toast('最多只能上传9张图片');
                return;
            }
            document.getElementById('imageInput').click();
        }

        function handleImages(input) {
            const files = Array.from(input.files);
            
            if (selectedImages.length + files.length > MAX_IMAGES) {
                toast('最多只能上传9张图片');
                files.splice(MAX_IMAGES - selectedImages.length);
            }
            
            files.forEach(file => {
                if (!file.type.startsWith('image/')) {
                    toast('请选择图片文件');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImages.push({
                        file: file,
                        dataUrl: e.target.result
                    });
                    renderImages();
                };
                reader.readAsDataURL(file);
            });
            
            // 清空input，允许重复选择相同文件
            input.value = '';
        }

        function renderImages() {
            const container = document.getElementById('mediaContainer');
            const addBtn = document.getElementById('addBtn');
            
            // 移除所有现有的图片预览（保留添加按钮）
            container.querySelectorAll('.media-item').forEach(el => el.remove());
            
            // 添加图片预览
            selectedImages.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'media-item';
                item.innerHTML = `
                    <img src="${img.dataUrl}" alt="图片${index + 1}">
                    <button class="media-delete" onclick="deleteImage(${index})">×</button>
                `;
                container.insertBefore(item, addBtn);
            });
            
            // 更新计数
            document.getElementById('mediaCount').textContent = `${selectedImages.length}/${MAX_IMAGES}`;
            
            // 控制添加按钮显示/隐藏
            if (selectedImages.length >= MAX_IMAGES) {
                addBtn.style.display = 'none';
            } else {
                addBtn.style.display = 'flex';
            }
        }

        function deleteImage(index) {
            selectedImages.splice(index, 1);
            renderImages();
        }

        // ========== 其他功能 ==========

        function selectLocation() {
            toast('定位功能：当前位置 牛路村');
        }

        function selectVillage() {
            toast('所属村庄：牛路村');
        }

        function publish() {
            const perms = ROLE_PERMS[currentRole];
            
            if (!isTypeAllowed(selectedType, perms)) {
                toast('当前身份无权限发布此类型内容');
                return;
            }
            
            const content = document.getElementById('content').value.trim();
            if (!content && selectedImages.length === 0) {
                toast('请输入内容或添加图片');
                return;
            }

            const postData = {
                type: selectedType,
                content: content,
                location: document.getElementById('location').textContent,
                village: document.getElementById('village').textContent,
                images: selectedImages.length,
                timestamp: new Date().toISOString()
            };
            
            console.log('发布数据:', postData);
            toast(`发布成功！${selectedImages.length > 0 ? '包含' + selectedImages.length + '张图片' : ''}`);
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // 初始化
        checkLogin();
    </script>
</body>
</html>
