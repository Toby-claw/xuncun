<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发布 - 寻村</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .publish-page { background: #f5f5f5; min-height: 100vh; }
        .pub-header {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .pub-header h2 { font-size: 17px; font-weight: 600; }
        .pub-header .cancel { color: #666; font-size: 15px; }
        .pub-header .submit {
            background: #10b981;
            color: #fff;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 14px;
            border: none;
        }
        .pub-header .submit:disabled { background: #ccc; }

        .pub-type {
            background: #fff;
            padding: 16px;
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }
        .type-item {
            flex: 1;
            text-align: center;
            padding: 16px 12px;
            border-radius: 12px;
            border: 2px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .type-item.active {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .type-item .icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .type-travel .icon { background: #fef3c7; }
        .type-product .icon { background: #fce7f3; }
        .type-notice .icon { background: #dbeafe; }

        .pub-content {
            background: #fff;
            padding: 16px;
        }
        .pub-textarea {
            width: 100%;
            min-height: 120px;
            border: none;
            resize: none;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }
        .pub-textarea::placeholder { color: #999; }

        .pub-media {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .media-add {
            width: 80px;
            height: 80px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            cursor: pointer;
        }
        .media-add svg { margin-bottom: 4px; }

        .pub-options {
            background: #fff;
            margin-top: 12px;
            padding: 0 16px;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .option-item:last-child { border-bottom: none; }
        .option-item svg { margin-right: 12px; color: #666; }
        .option-item span { flex: 1; font-size: 15px; }
        .option-item .arrow { color: #999; }
        .option-item .value { color: #999; font-size: 14px; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="publish-page">
        <div class="pub-header">
            <span class="cancel" onclick="goBack()">取消</span>
            <h2>发布内容</h2>
            <button class="submit" onclick="publish()">发布</button>
        </div>

        <div class="pub-type">
            <div class="type-item type-travel active" onclick="selectType(this, 'travel')">
                <div class="icon">📸</div>
                <div>发游记</div>
            </div>
            <div class="type-item type-product" onclick="selectType(this, 'product')">
                <div class="icon">🍊</div>
                <div>卖好物</div>
            </div>
            <div class="type-item type-notice" onclick="selectType(this, 'notice')">
                <div class="icon">📢</div>
                <div>发公告</div>
            </div>
        </div>

        <div class="pub-content">
            <textarea class="pub-textarea" placeholder="分享你在村庄的见闻、美食、风景..." id="content"></textarea>
            <div class="pub-media">
                <div class="media-add" onclick="addMedia()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>添加图片</span>
                </div>
            </div>
        </div>

        <div class="pub-options">
            <div class="option-item" onclick="selectLocation()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>所在位置</span>
                <span class="value" id="location">牛路村</span>
                <span class="arrow">›</span>
            </div>
            <div class="option-item" onclick="selectVillage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>所属村庄</span>
                <span class="value" id="village">牛路村</span>
                <span class="arrow">›</span>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let selectedType = 'travel';

        function goBack() {
            window.location.href = 'index.html';
        }

        function selectType(el, type) {
            document.querySelectorAll('.type-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            selectedType = type;

            const textarea = document.getElementById('content');
            if (type === 'travel') {
                textarea.placeholder = '分享你在村庄的见闻、美食、风景...';
            } else if (type === 'product') {
                textarea.placeholder = '介绍你的产品，包括品种、价格、联系方式...';
            } else if (type === 'notice') {
                textarea.placeholder = '发布村务通知、活动公告...';
            }
        }

        function addMedia() {
            toast('选择图片功能（演示版）');
        }

        function selectLocation() {
            toast('定位功能（演示版）');
        }

        function selectVillage() {
            toast('选择村庄功能（演示版）');
        }

        function publish() {
            const content = document.getElementById('content').value.trim();
            if (!content) {
                toast('请输入内容');
                return;
            }

            toast('发布成功！');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
