<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 寻村</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            min-height: 100vh;
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .login-logo {
            width: 80px;
            height: 80px;
            background: #f0fdf4;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        
        .login-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .wx-login-btn {
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        
        .wx-login-btn:active {
            opacity: 0.9;
        }
        
        .phone-login-btn {
            background: #f5f5f5;
            color: #333;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }
        
        .login-tips {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }
        
        .login-tips a {
            color: #10b981;
        }
        
        /* 扫码登录样式 */
        .qrcode-box {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .qrcode {
            width: 180px;
            height: 180px;
            background: #fff;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            border: 1px solid #ddd;
        }
        
        .qrcode-tip {
            font-size: 13px;
            color: #666;
            margin-top: 12px;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        
        /* 演示用户选择 */
        .demo-users {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px dashed #ddd;
        }
        
        .demo-users-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }
        
        .demo-user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 8px;
            border: 1px solid #eee;
        }
        
        .demo-user-item:hover {
            background: #f9f9f9;
        }
        
        .demo-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            margin-right: 12px;
        }
        
        .demo-user-info {
            text-align: left;
            flex: 1;
        }
        
        .demo-user-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .demo-user-role {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="back-btn" onclick="goBack()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
            返回
        </div>
        
        <div class="login-box">
            <div class="login-logo">🏡</div>
            <div class="login-title">欢迎使用寻村</div>
            <div class="login-subtitle">连接城市与乡村，发现真实的乡村之美</div>
            
            <!-- 微信登录按钮 -->
            <button class="wx-login-btn" onclick="wxLogin()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.27-.027-.407-.03zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/>
                </svg>
                微信一键登录
            </button>
            
            <button class="phone-login-btn" onclick="phoneLogin()">
                手机号登录
            </button>
            
            <div class="login-tips">
                登录即表示您同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a>
            </div>
            
            <!-- 演示账号快速登录 -->
            <div class="demo-users">
                <div class="demo-users-title">演示账号（点击快速登录）</div>
                
                <div class="demo-user-item" onclick="demoLogin('tourist')">
                    <div class="demo-user-avatar">👤</div>
                    <div class="demo-user-info">
                        <div class="demo-user-name">游客小林</div>
                        <div class="demo-user-role">普通用户 · 可发游记</div>
                    </div>
                </div>
                
                <div class="demo-user-item" onclick="demoLogin('villager')">
                    <div class="demo-user-avatar">🏠</div>
                    <div class="demo-user-info">
                        <div class="demo-user-name">阿芳姐</div>
                        <div class="demo-user-role">村民 · 可发游记+卖好物</div>
                    </div>
                </div>
                
                <div class="demo-user-item" onclick="demoLogin('admin')">
                    <div class="demo-user-avatar">👨‍💼</div>
                    <div class="demo-user-info">
                        <div class="demo-user-name">李主任</div>
                        <div class="demo-user-role">管理员 · 可发所有内容</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 微信扫码弹窗 -->
    <div class="modal" id="wxModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:#fff;border-radius:16px;padding:24px;width:90%;max-width:300px;text-align:center;">
            <h3 style="margin-bottom:16px;">微信扫码登录</h3>
            <div class="qrcode-box" style="background:#f5f5f5;border-radius:8px;padding:20px;">
                <div class="qrcode" style="width:180px;height:180px;background:#fff;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;color:#999;border:1px solid #ddd;">
                    [微信二维码]
                </div>
                <div style="font-size:13px;color:#666;margin-top:12px;">请使用微信扫一扫</div>
            </div>
            <button onclick="closeWxModal()" style="margin-top:16px;padding:10px 24px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;">取消</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // 检查是否已登录
        function checkLogin() {
            const user = localStorage.getItem('xuncun_user');
            if (user) {
                // 已登录，返回上一页或首页
                const returnUrl = sessionStorage.getItem('returnUrl') || 'index.html';
                window.location.href = returnUrl;
            }
        }
        
        // 页面加载时检查
        checkLogin();
        
        function goBack() {
            window.history.back();
        }
        
        // 微信登录
        function wxLogin() {
            // 显示扫码弹窗（演示）
            document.getElementById('wxModal').style.display = 'flex';
            
            // 模拟扫码成功（3秒后自动登录为普通用户）
            setTimeout(() => {
                document.querySelector('.qrcode').innerHTML = '<div style="color:#07c160;font-size:48px;">✓</div>';
                
                setTimeout(() => {
                    doLogin({
                        id: 'wx_' + Date.now(),
                        name: '微信用户' + Math.floor(Math.random() * 10000),
                        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + Date.now(),
                        role: 'user',
                        roleName: '注册用户'
                    });
                }, 500);
            }, 3000);
        }
        
        function closeWxModal() {
            document.getElementById('wxModal').style.display = 'none';
        }
        
        // 手机号登录
        function phoneLogin() {
            toast('手机号登录功能开发中...');
        }
        
        // 演示登录
        function demoLogin(role) {
            const demoUsers = {
                tourist: {
                    id: 'demo_001',
                    name: '游客小林',
                    avatar: 'https://toby-claw.github.io/xuncun/avatars/xiaolin.png',
                    role: 'user',
                    roleName: '游客'
                },
                villager: {
                    id: 'demo_002',
                    name: '阿芳姐',
                    avatar: 'https://toby-claw.github.io/xuncun/avatars/afang.png',
                    role: 'villager',
                    roleName: '村民'
                },
                admin: {
                    id: 'demo_003',
                    name: '李主任',
                    avatar: 'https://toby-claw.github.io/xuncun/avatars/cunshu.png',
                    role: 'admin',
                    roleName: '管理员'
                }
            };
            
            doLogin(demoUsers[role]);
        }
        
        // 执行登录
        function doLogin(userInfo) {
            // 保存登录状态
            localStorage.setItem('xuncun_user', JSON.stringify(userInfo));
            localStorage.setItem('xuncun_token', 'demo_token_' + Date.now());
            
            toast('登录成功！');
            
            // 跳转到之前的页面或首页
            setTimeout(() => {
                const returnUrl = sessionStorage.getItem('returnUrl') || 'index.html';
                sessionStorage.removeItem('returnUrl');
                window.location.href = returnUrl;
            }, 1000);
        }
        
        // 退出登录（全局可用）
        function logout() {
            localStorage.removeItem('xuncun_user');
            localStorage.removeItem('xuncun_token');
            window.location.href = 'login.html';
        }
        
        // 获取当前用户
        function getCurrentUser() {
            const user = localStorage.getItem('xuncun_user');
            return user ? JSON.parse(user) : null;
        }
        
        // 检查是否登录（用于其他页面）
        function requireLogin(returnUrl) {
            const user = getCurrentUser();
            if (!user) {
                sessionStorage.setItem('returnUrl', returnUrl);
                window.location.href = 'login.html';
                return false;
            }
            return user;
        }
        
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
